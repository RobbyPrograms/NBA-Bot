# Builds real JSON from nba_predictor.py and publishes it to branch `report-data`
# so Vercel can set ROLI_REPORT_URL to:
#   https://raw.githubusercontent.com/<owner>/<repo>/report-data/live-report.json
#
# stats.nba.com often blocks or throttles GitHub-hosted runner IPs (Azure). If jobs
# always time out, use a self-hosted runner, run locally and push JSON (see README),
# or add repo secret ROLI_HTTPS_PROXY (residential / non-cloud proxy) — wired below.
#
# Requires: public repo (raw URLs are anonymous) OR use another host + URL.
name: Publish live report

on:
  workflow_dispatch:
  schedule:
    # ~11:00 UTC and ~23:00 UTC — adjust for when you want fresh slates (NBA day = US Eastern)
    - cron: "0 11,23 * * *"

permissions:
  contents: write

concurrency:
  group: publish-live-report
  cancel-in-progress: true

jobs:
  publish:
    # Use self-hosted so stats.nba.com sees your home IP (GitHub-hosted Azure IPs are often blocked).
    # Install a runner: Repo Settings → Actions → Runners → New self-hosted runner. See README.
    runs-on: self-hosted
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: actions/cache@v4
        with:
          path: nba_bot/rolibot_cache.pkl
          key: roli-model-${{ hashFiles('requirements.txt', 'nba_bot/nba_predictor.py') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run predictor (JSON)
        env:
          ROLI_JSON: "1"
          ROLI_JSON_OUT: ${{ github.workspace }}/roli-live-report.json
          ROLI_NBA_TIMEOUT: "240"
        shell: bash
        run: |
          set -e
          P="${{ secrets.ROLI_HTTPS_PROXY }}"
          if [ -n "$P" ]; then
            export HTTPS_PROXY="$P"
            export HTTP_PROXY="$P"
            echo "Using HTTPS_PROXY for stats.nba.com (nba_api/requests)."
          fi
          python -u nba_bot/nba_predictor.py

      - name: Push live-report.json to report-data branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          test -f "$GITHUB_WORKSPACE/roli-live-report.json"
          mkdir -p /tmp/roli-report-push
          cp "$GITHUB_WORKSPACE/roli-live-report.json" /tmp/roli-report-push/live-report.json
          cd /tmp/roli-report-push
          git init -b report-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-report.json
          git commit -m "chore: update live report $(date -u +%Y-%m-%dT%H:%MZ)"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin report-data
